name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  fmt:
    if: github.actor != 'github-actions[bot]'
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

  lint:
    if: github.actor != 'github-actions[bot]'
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9

  test:
    if: github.actor != 'github-actions[bot]'
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go test
        run: go test ./...

      - name: Fuzz smoke test
        run: go test -run=FuzzSanitizePhone -fuzz=FuzzSanitizePhone -fuzztime=10s ./pkg/generators

  screenshots:
    if: github.actor != 'github-actions[bot]'
    name: Screenshots staleness check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CLI
        run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o resume-generator .

      - name: Regenerate screenshots
        run: ./resume-generator screenshots --input assets/example_resumes/software_engineer.yml

      - name: Check for stale screenshots
        run: |
          if ! git diff --quiet assets/example_results/; then
            echo "::error::Screenshots are stale. Run 'just screenshots' and commit the updated PNGs."
            git diff --stat assets/example_results/
            exit 1
          fi
